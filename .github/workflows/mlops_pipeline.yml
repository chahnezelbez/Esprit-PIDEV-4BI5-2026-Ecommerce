name: MLOps Pipeline - Sougui.tn Purchasing

on:
  push:
    branches: [ main, bi-innovateurs ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check structure
        run: |
          echo "Repository structure:"
          ls -la
          echo ""
          echo "Checking SouguiMlops:"
          ls -la SouguiMlops/ || echo "Not found"
      
      - name: Run tests
        run: |
          echo "CI/CD Pipeline is working!"
          echo "MLOps Pipeline ready for Sougui.tn"
